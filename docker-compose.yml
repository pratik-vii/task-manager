services:
  task-manager:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-256-bits-long-secret-key-here}
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/taskmanager.db
    volumes:
      - task-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  task-data:
